<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.3" stroke-opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow blob top-left -->
  <ellipse cx="200" cy="180" rx="300" ry="200" fill="white" fill-opacity="0.02"/>

  <!-- Border -->
  <rect x="40" y="40" width="1120" height="550" rx="16" fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Status dot -->
  <circle cx="96" cy="110" r="5" fill="#4ade80"/>
  <text x="112" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#4ade80" letter-spacing="3" text-transform="uppercase">DISPONÍVEL PARA OPORTUNIDADES</text>

  <!-- Main name -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="800" fill="white" letter-spacing="-4">Jefferson Teles</text>

  <!-- Role -->
  <text x="84" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="300" fill="rgba(255,255,255,0.4)" letter-spacing="1">Software Engineer  ·  AI Builder  ·  Cascavel, PR</text>

  <!-- Divider -->
  <line x1="80" y1="360" x2="400" y2="360" stroke="white" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Stack tags -->
  <rect x="80" y="385" width="90" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="125" y="405" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-weight="600">React</text>

  <rect x="184" y="385" width="100" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="234" y="405" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-weight="600">Node.js</text>

  <rect x="298" y="385" width="100" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="348" y="405" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-weight="600">Python</text>

  <rect x="412" y="385" width="80" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="452" y="405" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-weight="600">AI/ML</text>

  <!-- URL -->
  <text x="80" y="560" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.2)" letter-spacing="2">portifolio-jefferson-phi.vercel.app</text>

  <!-- Right side — metrics -->
  <text x="900" y="240" font-family="system-ui" font-size="72" font-weight="800" fill="white" text-anchor="middle">10+</text>
  <text x="900" y="272" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="3" font-weight="600">PROJETOS</text>

  <text x="900" y="360" font-family="system-ui" font-size="72" font-weight="800" fill="white" text-anchor="middle">4+</text>
  <text x="900" y="392" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="3" font-weight="600">ANOS</text>

  <line x1="820" y1="180" x2="820" y2="430" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
</svg>
